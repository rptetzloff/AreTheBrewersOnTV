<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brewers All-Time Head-to-Head</title>
    <meta name="description" content="The Milwaukee Brewers' all-time record against every opponent they've ever faced.">
    <meta property="og:title" content="Brewers All-Time Head-to-Head">
    <meta property="og:description" content="The Milwaukee Brewers' all-time record against every opponent they've ever faced.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <!-- Absolute asset paths: this shell is also served at /vs/<opponent>, where relative paths would break. -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container records-container">
        <a href="/" class="records-back"><i class="mdi mdi-arrow-left"></i> Are the Brewers On TV?</a>
        <h1 class="records-title">Head-to-Head</h1>
        <p id="h2h-subtitle" class="records-subtitle"></p>
        <div id="h2h-focus"></div>
        <div class="h2h-controls">
            <input id="h2h-filter" class="h2h-filter" type="search" placeholder="Filter opponents..." aria-label="Filter opponents">
            <select id="h2h-venue" class="h2h-select" aria-label="Venue">
                <option value="all">All venues</option>
                <option value="HOME">Home</option>
                <option value="AWAY">Away</option>
            </select>
            <select id="h2h-type" class="h2h-select" aria-label="Game type">
                <option value="all">All games</option>
                <option value="regular">Regular season</option>
                <option value="playoffs">Playoffs</option>
            </select>
            <label class="h2h-check"><input type="checkbox" id="h2h-current"> Current franchises only</label>
        </div>
        <p id="h2h-count" class="h2h-count"></p>
        <div id="h2h-table-wrap" class="h2h-table-wrap">
            <div class="loading">Loading opponents...</div>
        </div>
    </div>

    <footer class="site-footer">
        <p class="footer-disclaimer">Channel information is based on publicly available channel listings. Please check your local channel guide for the most accurate broadcast information.</p>
        <a href="https://github.com/rptetzloff/AreTheBrewersUndefeated" target="_blank" rel="noopener noreferrer" class="github-link">
            <i class="mdi mdi-github"></i>
            View on GitHub
        </a>
    </footer>

    <script src="/vs.js" type="module"></script>
</body>
</html>
