name: Update Brewers Data

on:
  # Wednesday 10:00 UTC — covers Tuesday night games that finish late
  schedule:
    - cron: '0 10 * * 3'
  # Allow manual runs from the Actions tab at any time
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest game data
        run: node update-data.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated CSVs
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brewers_games.csv data/brewers_season_records.csv
          git commit -m "chore: update Brewers game data [skip ci]"
          git push
